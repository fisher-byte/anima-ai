<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 32 32" fill="none">
  <!-- Outer circle (subtle ring) -->
  <circle cx="16" cy="16" r="14" stroke="#111827" stroke-width="1.5" fill="none" opacity="0.12"/>
  <!-- Central node -->
  <circle cx="16" cy="16" r="3" fill="#111827"/>
  <!-- Three orbital nodes -->
  <circle cx="16" cy="5.5" r="2" fill="#111827" opacity="0.7"/>
  <circle cx="25.5" cy="22" r="2" fill="#111827" opacity="0.7"/>
  <circle cx="6.5" cy="22" r="2" fill="#111827" opacity="0.7"/>
  <!-- Connection lines from center to nodes -->
  <line x1="16" y1="13" x2="16" y2="7.5" stroke="#111827" stroke-width="1" opacity="0.35"/>
  <line x1="18.6" y1="17.5" x2="23.8" y2="20.5" stroke="#111827" stroke-width="1" opacity="0.35"/>
  <line x1="13.4" y1="17.5" x2="8.2" y2="20.5" stroke="#111827" stroke-width="1" opacity="0.35"/>
</svg>
